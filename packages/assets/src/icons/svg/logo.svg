<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 800 400"
     preserveAspectRatio="xMidYMid meet"
     role="img"
     aria-label="NEXT REP logo">

  <style>
    :root {
      --bg: transparent;
      --next-fill: #07131d;
      --next-stroke: rgba(7,19,29,0.12);
      --rep-base: #00d99f;
      --rep-core: #00d99f;
      --rep-core-soft: #00ffb8;
      --rep-aura: #aefee5;
      --shadow: rgba(7,19,29,0.18);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: transparent;
        --next-fill: #f3f7fb;
        --next-stroke: rgba(255,255,255,0.16);
        --rep-base: #00ffc2;
        --rep-core: #00ffc2;
        --rep-core-soft: #b6ffe8;
        --rep-aura: #dbfff2;
        --shadow: rgba(0,0,0,0.42);
      }
    }

    .bg { fill: var(--bg); }

    .next {
      fill: var(--next-fill);
      stroke: var(--next-stroke);
      stroke-width: 1;
      paint-order: stroke fill;
      filter: url(#nextShadow);
      vector-effect: non-scaling-stroke;
    }

    .rep-base {
      fill: none;
      stroke: var(--rep-base);
      stroke-width: 4;
      opacity: 0.94;
      stroke-linecap: round;
      stroke-linejoin: round;
      vector-effect: non-scaling-stroke;
    }

    .rep-bloom,
    .rep-pulse {
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      vector-effect: non-scaling-stroke;
      stroke-dasharray: 160 840;
      stroke-dashoffset: 1000;
      opacity: 0;
      animation: repTravel 4.8s cubic-bezier(.4,0,.2,1) infinite;
    }

    .rep-bloom {
      stroke: var(--rep-core-soft);
      stroke-width: 8;
      filter: url(#repBloom);
      opacity: 0.55;
    }

    .rep-pulse {
      stroke: url(#repPulse);
      stroke-width: 3;
      filter: url(#repGlow);
    }

    .rep-r { animation-delay: 0s; }
    .rep-e { animation-delay: 1.6s; }
    .rep-p { animation-delay: 3.2s; }

    @keyframes repTravel {
      0%   { stroke-dashoffset: 1000; opacity: 0; }
      10%  { opacity: 0.08; }
      22%  { opacity: 1; }
      38%  { stroke-dashoffset: 0; opacity: 1; }
      60%  { opacity: 0.40; }
      100% { stroke-dashoffset: -1000; opacity: 0; }
    }
  </style>

  <defs>
    <linearGradient id="repPulse" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%"   stop-color="var(--rep-core)" stop-opacity="0"/>
      <stop offset="20%"  stop-color="var(--rep-core)" stop-opacity="0.95"/>
      <stop offset="50%"  stop-color="var(--rep-aura)" stop-opacity="1"/>
      <stop offset="80%"  stop-color="var(--rep-core)" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="var(--rep-core)" stop-opacity="0"/>
    </linearGradient>

    <filter id="nextShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="var(--shadow)" flood-opacity="1"/>
      <feDropShadow dx="0" dy="0" stdDeviation="1.5" flood-color="#ffffff" flood-opacity="0.08"/>
    </filter>

    <filter id="repBloom" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="b2"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="b3"/>
      <feMerge>
        <feMergeNode in="b3"/>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
      </feMerge>
    </filter>

    <filter id="repGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect class="bg" x="0" y="0" width="800" height="400"/>

  <!-- NEXT -->
